name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  production:
    name: Production deployment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      VITE_CLERK_JWT_TEMPLATE: ${{ secrets.VITE_CLERK_JWT_TEMPLATE }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      VITE_API_VERSION: v1
      VITE_API_PREFIX: /api/v1
      VITE_API_TIMEOUT_MS: 30000
      VITE_API_RETRY_COUNT: 1
      VITE_API_WITH_CREDENTIALS: false
      VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}
      VITE_APP_ENV: production
      VITE_ENABLE_SOURCEMAPS: false
      VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
      VITE_ERROR_LOG_ENDPOINT: ${{ secrets.VITE_ERROR_LOG_ENDPOINT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Verify production build
        run: npm run build:production

      - name: Deploy frontend to Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel build --prod --token "$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"

      - name: Skip Vercel deployment when secrets are missing
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: echo "Vercel deployment skipped because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."

      - name: Trigger Render backend deployment
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Skip Render deployment when hook is missing
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "Render deployment skipped because RENDER_DEPLOY_HOOK_URL is not configured."
