name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  frontend:
    name: Frontend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_VERSION: v1
      VITE_API_PREFIX: /api/v1
      VITE_API_TIMEOUT_MS: 30000
      VITE_API_RETRY_COUNT: 1
      VITE_API_WITH_CREDENTIALS: false
      VITE_ADMIN_EMAILS: admin@pulse.local
      VITE_APP_ENV: ci
      VITE_ENABLE_SOURCEMAPS: false
      VITE_SITE_URL: http://localhost:5173
      VITE_ERROR_LOG_ENDPOINT: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm install

      - name: Check Prettier formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type checking
        run: npm run typecheck

      - name: Run frontend tests
        run: npm run test

      - name: Build production frontend
        run: npm run build:production

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pulse-ai-frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: ci
      DEBUG: false
      APP_NAME: Pulse AI API
      APP_VERSION: 1.0.0
      API_V1_PREFIX: /api/v1
      MONGODB_URI: mongodb://localhost:27017
      MONGODB_DB_NAME: pulse_ai_ci
      BACKEND_CORS_ORIGINS: http://localhost:5173
      SECURITY_ALLOWED_HOSTS: "*"
      CLERK_ISSUER: ""
      CLERK_JWKS_URL: ""
      CLERK_AUTHORIZED_PARTIES: http://localhost:5173
      ADMIN_EMAILS: admin@pulse.local
      INTERNAL_JWT_SECRET: ci-only-secret
      AI_DEFAULT_PROVIDER: mock
      AI_ENABLED_PROVIDERS: mock
      LOG_LEVEL: INFO
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Run backend tests
        run: pytest
